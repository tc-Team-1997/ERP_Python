version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: business_saas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: business_saas_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  frontend:
    image: python:3.11-slim
    container_name: business_saas_frontend
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    command: bash -c "pip install --no-cache-dir -r requirements.txt && streamlit run frontend/app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "8501:8501"
    volumes:
      - ./:/app

volumes:
  postgres_data:
